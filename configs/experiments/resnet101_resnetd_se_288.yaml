project:
  experiment_name: resnet101_resnetd_se_288

dataset:
  image_size: 288

dataloader:
  batch_size: 16
  val_batch_size: 32
  num_workers: 8
  pin_memory: true
  persistent_workers: true

model:
  name: resnet101
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: true
  attention: se
  param_limit_million: 100

augmentation:
  preset: strong
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: true
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_erasing:
      enabled: true
      prob: 0.2
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 320
    center_crop: 288
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: true
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.3

loss:
  name: cross_entropy
  label_smoothing: 0.02
  focal_gamma: 2.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.05
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 45
  warmup_epochs: 3
  min_lr_ratio: 0.01

train:
  epochs: 45
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  early_stopping:
    enabled: true
    patience: 12
  ema:
    enabled: true
    decay: 0.9999
