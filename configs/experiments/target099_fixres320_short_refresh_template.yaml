project:
  experiment_name: target099_fixres320_short_refresh_template

experiment:
  stage: stage0
  rationale: Short low-LR FixRes refresh template on top of the winning Stage 0 tail-aware base.
  notes: Pass the winning base checkpoint with --init-ckpt or set train.init_checkpoint directly before running.
  tags: [target099, stage0, fixres, short_refresh]
  expected_artifacts:
    - summary.json
    - run_metadata.json
    - history.csv
    - checkpoints/best.ckpt

dataset:
  image_size: 320

dataloader:
  batch_size: 12
  val_batch_size: 24
  num_workers: 8
  pin_memory: true
  persistent_workers: true

sampler:
  name: none

model:
  name: resnet101
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none
  param_limit_million: 100

augmentation:
  preset: basic
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: false
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    random_erasing:
      enabled: false
      prob: 0.0
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 352
    center_crop: 320
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: false
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.0

loss:
  name: logit_adjusted_ce  # Replace to match the actual winning Stage 0 base if needed.
  label_smoothing: 0.02
  focal_gamma: 2.0
  logit_adjusted_tau: 1.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.00005
  weight_decay: 0.01
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 2
  warmup_epochs: 0
  min_lr_ratio: 0.3

train:
  epochs: 2
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  init_checkpoint: null
  init_use_ema: true
  early_stopping:
    enabled: false
    patience: 4
  ema:
    enabled: true
    decay: 0.9997
  model_selection:
    source: auto
    metric: val_nll
    mode: min
  checkpointing:
    save_every_epoch: true
    keep_top_k: 2
