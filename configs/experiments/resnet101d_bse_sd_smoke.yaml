project:
  experiment_name: resnet101d_bse_sd_smoke
  seed: 42

dataset:
  image_size: 224

dataloader:
  batch_size: 8
  val_batch_size: 8
  num_workers: 2
  pin_memory: true
  persistent_workers: true

model:
  name: resnet101d_bse_sd
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: true
  attention: none
  se_mode: bottleneck
  se_reduction: 16
  drop_path_rate: 0.05
  param_limit_million: 100

augmentation:
  preset: basic
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: false
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    random_erasing:
      enabled: false
      prob: 0.0
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 256
    center_crop: 224
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: false
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.0

loss:
  name: cross_entropy
  label_smoothing: 0.0
  focal_gamma: 2.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.05
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 2
  warmup_epochs: 0
  min_lr_ratio: 0.1

train:
  epochs: 2
  amp: true
  grad_clip_norm: 1.0
  log_interval: 20
  early_stopping:
    enabled: false
    patience: 2
  ema:
    enabled: false
    decay: 0.9998
