project:
  experiment_name: resnet101_strong_v1

dataloader:
  batch_size: 16
  val_batch_size: 32
  num_workers: 4
  pin_memory: true
  persistent_workers: true

model:
  name: resnet101
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none
  param_limit_million: 100

augmentation:
  preset: strong
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: true
      num_ops: 2
      magnitude: 9
    color_jitter:
      enabled: true
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_erasing:
      enabled: true
      prob: 0.25
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 256
    center_crop: 224
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: true
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.7

loss:
  name: cross_entropy
  label_smoothing: 0.1
  focal_gamma: 2.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.05
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 35
  warmup_epochs: 3
  min_lr_ratio: 0.01

train:
  epochs: 35
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  early_stopping:
    enabled: true
    patience: 8
  ema:
    enabled: true
    decay: 0.9999

