project:
  experiment_name: target099_stage2_repeated_holdout_kfold_template
  seed: 42

experiment:
  stage: stage2
  rationale: Repeated-holdout ranking template using fold-based splits over train when the official val set is too small to break ties.
  notes: Explicitly disables the built-in val directory by setting dataset.val_dir to null so fold-based splitting is used instead.
  tags: [target099, stage2, repeated_holdout, template]
  expected_artifacts:
    - summary.json
    - run_metadata.json
    - history.csv
    - checkpoints/best.ckpt
    - checkpoints/epoch_*.ckpt
  stage_gate:
    metric: val_acc
    mode: max
    pass_threshold: 89.5
    fail_threshold: 88.5

dataset:
  data_dir: data
  dataset_type: folder
  train_dir: train
  val_dir: null
  test_dir: test
  num_classes: 100
  image_size: 256
  stratified: true
  kfold:
    enabled: true
    n_splits: 5
    fold: 0

dataloader:
  batch_size: 32
  val_batch_size: 64
  num_workers: 8
  pin_memory: true
  persistent_workers: true

sampler:
  name: none

model:
  name: resnet101
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none
  param_limit_million: 100

augmentation:
  preset: strong
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: true
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_erasing:
      enabled: true
      prob: 0.25
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 288
    center_crop: 256
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: true
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.5

loss:
  name: logit_adjusted_ce
  label_smoothing: 0.05
  focal_gamma: 2.0
  logit_adjusted_tau: 1.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.05
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 35
  warmup_epochs: 3
  min_lr_ratio: 0.01

train:
  epochs: 35
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  init_checkpoint: null
  init_use_ema: false
  early_stopping:
    enabled: true
    patience: 8
  ema:
    enabled: true
    decay: 0.9999
  model_selection:
    source: auto
    metric: val_nll
    mode: min
  checkpointing:
    save_every_epoch: true
    keep_top_k: 5
