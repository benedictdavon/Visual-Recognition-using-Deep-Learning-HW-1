project:
  experiment_name: target099_s0_r4_fixres320_from_s0r1
  seed: 2026

experiment:
  stage: stage0
  rationale: Short low-LR FixRes refresh for the S0-R1 logit-adjusted base if that base wins Stage 0.
  notes: Use this config only if S0-R1 wins. Pass the winning checkpoint through --init-ckpt and keep EMA warm-start enabled.
  tags: [target099, stage0, s0-r4, fixres, from_s0-r1]
  expected_artifacts:
    - summary.json
    - run_metadata.json
    - history.csv
    - checkpoints/best.ckpt
    - checkpoints/epoch_*.ckpt
  stage_gate:
    metric: val_acc
    mode: max
    pass_threshold: 90.0
    fail_threshold: 89.0

dataset:
  image_size: 320

dataloader:
  batch_size: 12
  val_batch_size: 24
  num_workers: 8
  pin_memory: true
  persistent_workers: true

sampler:
  name: none

model:
  name: resnet101
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none
  param_limit_million: 100

augmentation:
  preset: basic
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: false
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    random_erasing:
      enabled: false
      prob: 0.0
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 352
    center_crop: 320
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: false
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.0

loss:
  name: logit_adjusted_ce
  label_smoothing: 0.02
  focal_gamma: 2.0
  logit_adjusted_tau: 1.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.00005
  weight_decay: 0.01
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 2
  warmup_epochs: 0
  min_lr_ratio: 0.3

train:
  epochs: 2
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  init_checkpoint: null
  init_use_ema: true
  early_stopping:
    enabled: false
    patience: 4
  ema:
    enabled: true
    decay: 0.9997
  model_selection:
    source: auto
    metric: val_nll
    mode: min
  checkpointing:
    save_every_epoch: true
    keep_top_k: 2
