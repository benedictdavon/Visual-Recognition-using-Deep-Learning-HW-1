project:
  experiment_name: target099_crt_classifier_rebalance_template
  seed: 2026

experiment:
  stage: stage_crt_rebalance
  rationale: Test the cRT hypothesis by freezing the ResNet101 backbone and rebalancing only the classifier head from the strongest logit-adjusted base checkpoint.
  notes: Point staged_training.parent_checkpoint at the chosen base checkpoint or pass --init-ckpt. The rebalance stage is intentionally classifier-only and more class-balanced than the base.
  tags: [target099, crt, classifier_rebalance, resnet101, template]
  expected_artifacts:
    - summary.json
    - run_metadata.json
    - history.csv
    - checkpoints/best.ckpt
    - checkpoints/epoch_*.ckpt
  stage_gate:
    metric: val_macro_recall
    mode: max
    pass_threshold: 89.5
    fail_threshold: 88.5

dataset:
  image_size: 256

dataloader:
  batch_size: 64
  val_batch_size: 96
  num_workers: 8
  pin_memory: true
  persistent_workers: true

sampler:
  name: weighted_random
  power: 1.0
  replacement: true
  num_samples: null

model:
  name: resnet101
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none
  param_limit_million: 100

augmentation:
  preset: basic
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: false
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    random_erasing:
      enabled: false
      prob: 0.0
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 288
    center_crop: 256
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: false
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.0

loss:
  name: cross_entropy
  label_smoothing: 0.0
  focal_gamma: 2.0
  logit_adjusted_tau: 1.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.0007
  weight_decay: 0.01
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 6
  warmup_epochs: 0
  min_lr_ratio: 0.1

train:
  epochs: 6
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  init_checkpoint: null
  init_use_ema: true
  early_stopping:
    enabled: true
    patience: 3
  ema:
    enabled: false
    decay: 0.9998
  model_selection:
    source: raw
    metric: val_nll
    mode: min
  checkpointing:
    save_every_epoch: true
    keep_top_k: 4

staged_training:
  stage_name: classifier_rebalance
  trainable_scope: classifier_only
  require_parent_checkpoint: true
  parent_checkpoint: null
  parent_use_ema: true
  parent_run_dir: null
  expected_parent_stages: [base, single_stage]
  lineage:
    base_checkpoint: null
    base_run_dir: null
    rebalance_checkpoint: null
    rebalance_run_dir: null
