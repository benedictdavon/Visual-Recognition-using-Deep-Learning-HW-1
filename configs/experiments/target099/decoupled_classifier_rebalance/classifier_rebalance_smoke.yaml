project:
  experiment_name: target099_crt_classifier_rebalance_smoke
  seed: 2026

experiment:
  stage: stage_crt_rebalance_smoke
  rationale: Smoke-check the staged classifier-only rebalance path against a real ResNet101 base checkpoint.
  notes: This is a short verification run. It should launch from a valid parent checkpoint, train only classifier.weight and classifier.bias, and keep lineage fields populated.
  tags: [target099, crt, classifier_rebalance, smoke]
  expected_artifacts:
    - summary.json
    - run_metadata.json
    - history.csv
    - checkpoints/best.ckpt
  stage_gate:
    metric: val_nll
    mode: min
    pass_threshold: 10.0
    fail_threshold: 20.0

dataset:
  image_size: 224

dataloader:
  batch_size: 96
  val_batch_size: 128
  num_workers: 0
  pin_memory: true
  persistent_workers: false

sampler:
  name: weighted_random
  power: 1.0
  replacement: true
  num_samples: null

model:
  name: resnet101
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none
  param_limit_million: 100

augmentation:
  preset: basic
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: false
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    random_erasing:
      enabled: false
      prob: 0.0
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 256
    center_crop: 224
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: false
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.0

loss:
  name: cross_entropy
  label_smoothing: 0.0
  focal_gamma: 2.0
  logit_adjusted_tau: 1.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.01
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 1
  warmup_epochs: 0
  min_lr_ratio: 0.1

train:
  epochs: 1
  amp: true
  grad_clip_norm: 1.0
  log_interval: 20
  init_checkpoint: null
  init_use_ema: true
  early_stopping:
    enabled: false
    patience: 1
  ema:
    enabled: false
    decay: 0.9998
  model_selection:
    source: raw
    metric: val_nll
    mode: min
  checkpointing:
    save_every_epoch: false
    keep_top_k: 0

staged_training:
  stage_name: classifier_rebalance
  trainable_scope: classifier_only
  require_parent_checkpoint: true
  parent_checkpoint: null
  parent_use_ema: true
  parent_run_dir: null
  expected_parent_stages: [base, single_stage]
  lineage:
    base_checkpoint: null
    base_run_dir: null
    rebalance_checkpoint: null
    rebalance_run_dir: null
