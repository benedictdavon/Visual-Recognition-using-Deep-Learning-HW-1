project:
  experiment_name: target099_bit_resnetv2_101x1_strong
  seed: 2026

experiment:
  stage: stage0
  rationale: High-upside transfer run for the BiT ResNetV2-101x1 backbone using the strongest target099 single-stage recipe family.
  notes: Uses the BiT pretrained normalization and native 448-resolution eval path. Select best.ckpt from the raw branch by validation NLL while still exporting EMA for later comparison.
  tags: [target099, stage0, bit, resnetv2_101x1, logit_adjusted, strong]
  expected_artifacts:
    - summary.json
    - run_metadata.json
    - history.csv
    - checkpoints/best.ckpt
    - checkpoints/best_raw.ckpt
    - checkpoints/best_ema.ckpt
    - checkpoints/epoch_*.ckpt
  stage_gate:
    metric: val_acc
    mode: max
    pass_threshold: 89.5
    fail_threshold: 87.5

dataset:
  image_size: 448

dataloader:
  batch_size: 8
  val_batch_size: 12
  num_workers: 8
  pin_memory: true
  persistent_workers: true

sampler:
  name: none

model:
  name: resnetv2_101x1_bit.goog_in21k_ft_in1k
  pretrained: true
  custom_pretrained_init: null
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none
  se_mode: none
  se_reduction: 16
  drop_path_rate: 0.0
  param_limit_million: 100

augmentation:
  preset: strong
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: true
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_erasing:
      enabled: true
      prob: 0.25
    normalize_mean: [0.5, 0.5, 0.5]
    normalize_std: [0.5, 0.5, 0.5]
  eval:
    resize: 448
    center_crop: 448
    normalize_mean: [0.5, 0.5, 0.5]
    normalize_std: [0.5, 0.5, 0.5]

mixup_cutmix:
  enabled: true
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.5

loss:
  name: logit_adjusted_ce
  label_smoothing: 0.05
  focal_gamma: 2.0
  logit_adjusted_tau: 1.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.0002
  weight_decay: 0.05
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 35
  warmup_epochs: 3
  min_lr_ratio: 0.01

train:
  epochs: 35
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  init_checkpoint: null
  init_use_ema: false
  early_stopping:
    enabled: true
    patience: 8
  ema:
    enabled: true
    decay: 0.9998
  model_selection:
    source: raw
    metric: val_nll
    mode: min
  checkpointing:
    save_every_epoch: true
    keep_top_k: 5
