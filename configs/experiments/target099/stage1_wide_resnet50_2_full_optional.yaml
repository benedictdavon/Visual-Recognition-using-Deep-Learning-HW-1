project:
  experiment_name: target099_stage1_wide_resnet50_2_full_optional
  seed: 2026

experiment:
  stage: stage1
  rationale: Full optional WideResNet50-2 run after the pilot passes and legality remains acceptable.
  notes: Legality-sensitive optional path. Run only if S0-R5 was acceptable and promising.
  tags: [target099, stage1, optional, legality_sensitive, wide_resnet50_2]
  expected_artifacts:
    - summary.json
    - run_metadata.json
    - history.csv
    - checkpoints/best.ckpt
    - checkpoints/epoch_*.ckpt
  stage_gate:
    metric: val_acc
    mode: max
    pass_threshold: 89.5
    fail_threshold: 87.5

dataset:
  image_size: 256

dataloader:
  batch_size: 24
  val_batch_size: 48
  num_workers: 8
  pin_memory: true
  persistent_workers: true

sampler:
  name: none

model:
  name: wide_resnet50_2
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none
  param_limit_million: 100

augmentation:
  preset: strong
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: true
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_erasing:
      enabled: true
      prob: 0.25
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 288
    center_crop: 256
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: true
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.5

loss:
  name: cross_entropy
  label_smoothing: 0.05
  focal_gamma: 2.0
  logit_adjusted_tau: 1.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.05
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 35
  warmup_epochs: 3
  min_lr_ratio: 0.01

train:
  epochs: 35
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  init_checkpoint: null
  init_use_ema: false
  early_stopping:
    enabled: true
    patience: 8
  ema:
    enabled: true
    decay: 0.9999
  model_selection:
    source: auto
    metric: val_nll
    mode: min
  checkpointing:
    save_every_epoch: true
    keep_top_k: 5
