project:
  experiment_name: resnext50_32x3d_fixres320
  seed: 2026

experiment:
  stage: fixres_refresh
  rationale: Short low-LR FixRes refresh for the best ResNeXt-50 32x3d base checkpoint.
  notes: Run only after the base ResNeXt-50 32x3d model is already competitive enough to justify a 320-resolution refresh.
  tags: [resnext50_32x3d, fixres, custom_resnext]
  expected_artifacts:
    - summary.json
    - run_metadata.json
    - history.csv
    - model_metadata.json
    - checkpoints/best.ckpt
    - checkpoints/epoch_*.ckpt
  stage_gate:
    metric: val_acc
    mode: max
    pass_threshold: 90.0
    fail_threshold: 88.0

dataset:
  image_size: 320

dataloader:
  batch_size: 24
  val_batch_size: 48
  num_workers: 8
  pin_memory: true
  persistent_workers: true

sampler:
  name: none

model:
  name: resnext50_32x3d
  pretrained: true
  custom_pretrained_init: resnext50_32x4d_slice
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none
  param_limit_million: 100

augmentation:
  preset: strong
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: true
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_erasing:
      enabled: false
      prob: 0.0
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 352
    center_crop: 320
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: false
  mixup_alpha: 0.0
  cutmix_alpha: 0.0
  prob: 0.0

loss:
  name: logit_adjusted_ce
  label_smoothing: 0.05
  focal_gamma: 2.0
  logit_adjusted_tau: 1.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.00005
  weight_decay: 0.05
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 2
  warmup_epochs: 0
  min_lr_ratio: 0.5

train:
  epochs: 2
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  init_checkpoint: null
  init_use_ema: true
  early_stopping:
    enabled: false
    patience: 2
  ema:
    enabled: true
    decay: 0.9999
  model_selection:
    source: auto
    metric: val_nll
    mode: min
  checkpointing:
    save_every_epoch: true
    keep_top_k: 2
