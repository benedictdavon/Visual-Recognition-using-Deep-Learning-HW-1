project:
  experiment_name: resnet101_fixres_finetune_288

dataset:
  image_size: 288

dataloader:
  batch_size: 16
  val_batch_size: 32
  num_workers: 8
  pin_memory: true
  persistent_workers: true

model:
  name: resnet101
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none
  param_limit_million: 100

augmentation:
  preset: basic
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: false
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    random_erasing:
      enabled: false
      prob: 0.0
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 320
    center_crop: 288
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: false
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.0

loss:
  name: cross_entropy
  label_smoothing: 0.02
  focal_gamma: 2.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.00005
  weight_decay: 0.01
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 8
  warmup_epochs: 1
  min_lr_ratio: 0.1

train:
  epochs: 8
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  init_checkpoint: outputs/20260312_134125_resnet101_strong_v2_fast/checkpoints/best.ckpt
  init_use_ema: true
  early_stopping:
    enabled: true
    patience: 4
  ema:
    enabled: true
    decay: 0.9997
