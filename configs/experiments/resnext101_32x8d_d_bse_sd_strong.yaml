project:
  experiment_name: resnext101_32x8d_d_bse_sd_strong
  seed: 42

dataset:
  image_size: 256

dataloader:
  batch_size: 6
  val_batch_size: 12
  num_workers: 8
  pin_memory: true
  persistent_workers: true

model:
  name: resnext101_32x8d_d_bse_sd
  pretrained: true
  num_classes: 100
  dropout: 0.0
  resnetd: true
  attention: none
  se_mode: bottleneck
  se_reduction: 16
  drop_path_rate: 0.10
  param_limit_million: 100

augmentation:
  preset: strong
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: true
      num_ops: 2
      magnitude: 5
    color_jitter:
      enabled: false
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_erasing:
      enabled: true
      prob: 0.25
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 288
    center_crop: 256
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: true
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.4

loss:
  name: cross_entropy
  label_smoothing: 0.05
  focal_gamma: 2.0
  class_weights: null

optimizer:
  name: adamw
  lr: 0.0002
  weight_decay: 0.05
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 40
  warmup_epochs: 4
  min_lr_ratio: 0.01

train:
  epochs: 40
  amp: true
  grad_clip_norm: 1.0
  log_interval: 50
  early_stopping:
    enabled: true
    patience: 10
  ema:
    enabled: true
    decay: 0.9998
