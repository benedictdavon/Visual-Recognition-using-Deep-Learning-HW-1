project:
  name: vrdl_hw1_resnet
  experiment_name: baseline_resnet50
  output_root: outputs
  seed: 42
  deterministic: false

dataset:
  data_dir: data
  dataset_type: folder  # auto, folder, csv
  train_dir: train
  val_dir: val
  test_dir: test
  train_csv: null
  test_csv: null
  train_images_dir: train_images
  test_images_dir: test_images
  filename_col: filename
  label_col: label
  id_col: id
  test_filename_col: filename
  test_id_from: sample_id  # sample_id (filename stem) or filename
  num_classes: 100
  image_size: 256
  val_ratio: 0.2
  stratified: true
  kfold:
    enabled: false
    n_splits: 5
    fold: 0

dataloader:
  batch_size: 32
  val_batch_size: 64
  num_workers: 4
  pin_memory: true
  persistent_workers: true

sampler:
  name: none  # none, weighted_random
  power: 0.5
  replacement: true
  num_samples: null

model:
  name: resnet50  # e.g. resnet50, resnet101, resnext101_32x8d, resnetv2_101x1_bit.goog_in21k_ft_in1k
  pretrained: true
  custom_pretrained_init: null  # null, resnext50_32x4d_slice (required for custom resnext50_32x3d pretrained init)
  num_classes: 100
  dropout: 0.0
  resnetd: false
  attention: none  # none, se, cbam
  se_mode: none  # none, bottleneck
  se_reduction: 16
  drop_path_rate: 0.0
  param_limit_million: 100

augmentation:
  preset: basic
  train:
    random_resized_crop: true
    resize_only: false
    hflip_prob: 0.5
    randaugment:
      enabled: false
      num_ops: 2
      magnitude: 9
    color_jitter:
      enabled: false
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    random_erasing:
      enabled: false
      prob: 0.25
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  eval:
    resize: 256
    center_crop: 224
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

mixup_cutmix:
  enabled: false
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.5

loss:
  name: cross_entropy  # cross_entropy, focal, balanced_softmax, logit_adjusted_ce, ldam
  label_smoothing: 0.0
  focal_gamma: 2.0
  logit_adjusted_tau: 1.0
  ldam_max_margin: 0.5
  ldam_scale: 30.0
  class_weights: null
  deferred_reweighting:
    enabled: false
    start_epoch: null
    power: 1.0
    normalize: mean_one

optimizer:
  name: adamw  # adamw, sgd
  lr: 0.0005
  weight_decay: 0.05
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 20
  warmup_epochs: 2
  min_lr_ratio: 0.01

train:
  epochs: 20
  amp: true
  grad_clip_norm: null
  log_interval: 50
  init_checkpoint: null
  init_use_ema: false
  early_stopping:
    enabled: false
    patience: 5
  ema:
    enabled: false
    decay: 0.9998
  model_selection:
    source: auto  # auto, raw, ema
    metric: val_acc  # val_acc, val_macro_recall, val_nll, val_ece, val_loss
    mode: auto  # auto, max, min
  checkpointing:
    save_every_epoch: false
    keep_top_k: 0

staged_training:
  stage_name: single_stage  # single_stage, base, classifier_rebalance, fixres_refresh
  trainable_scope: full_model  # full_model, classifier_only
  require_parent_checkpoint: false
  parent_checkpoint: null
  parent_use_ema: false
  parent_run_dir: null
  expected_parent_stages: []
  lineage:
    base_checkpoint: null
    base_run_dir: null
    rebalance_checkpoint: null
    rebalance_run_dir: null

experiment:
  stage: null
  rationale: null
  notes: null
  tags: []
  expected_artifacts: []
  stage_gate:
    metric: null
    mode: auto
    pass_threshold: null
    fail_threshold: null

inference:
  tta:
    enabled: false
    horizontal_flip: true
  output:
    id_column: image_name
    target_column: pred_label
    use_label_name: true
