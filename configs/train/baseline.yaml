optimizer:
  name: adamw
  lr: 0.0005
  weight_decay: 0.05
  momentum: 0.9

scheduler:
  name: cosine
  epochs: 20
  warmup_epochs: 2
  min_lr_ratio: 0.01

loss:
  name: cross_entropy
  label_smoothing: 0.0
  focal_gamma: 2.0
  class_weights: null

mixup_cutmix:
  enabled: false
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.5

train:
  epochs: 20
  amp: true
  grad_clip_norm: null
  log_interval: 50
  early_stopping:
    enabled: false
    patience: 5
  ema:
    enabled: false
    decay: 0.9998

